name: multando
description: Multando - Report traffic violations, earn rewards
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # SDK
  multando_sdk:
    path: ../multando-sdks/flutter/multando_sdk

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Camera & Media
  camera: ^0.11.0
  image_picker: ^1.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Storage
  hive: ^2.2.0
  path_provider: ^2.1.0

  # Utilities
  intl: ^0.20.0
  crypto: ^3.0.0
  device_info_plus: ^10.0.0
  connectivity_plus: ^5.0.0
  sensors_plus: ^5.0.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
